name: "✨ Feature Request (Advanced)"
description: "새로운 기능이나 개선 아이디어를 제안합니다."
title: "[FEAT]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: "📖 제안 배경"
      description: "현재 어떤 불편함이 있거나, 왜 이 기능이 필요한가요?"
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: "💡 상세 제안"
      description: "해당 기능이 어떻게 동작하길 원하시나요?"
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: "🚀 우선순위"
      description: "얼마나 시급한 작업인가요?"
      options:
        - P1 (긴급)
        - P2 (보통)
        - P3 (낮음)
  - type: textarea
    id: alternatives
    attributes:
      label: "🔍 고려해본 대안"
      description: "이 기능 외에 생각해보신 다른 해결 방법이 있나요?"