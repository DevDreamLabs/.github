name: "🛠 Tech Task"
description: "개발 작업, 리팩토링, 문서화 작업을 등록합니다."
title: "[CHORE]: "
labels: ["chore", "refactor", "doc"]
body:
  - type: textarea
    id: overview
    attributes:
      label: "📝 작업 개요"
      placeholder: "수행할 작업의 목적과 범위를 설명해 주세요."
    validations:
      required: true
  - type: textarea
    id: todo-list
    attributes:
      label: "📅 세부 작업 목록"
      value: |
        - [ ] 
        - [ ] 
        - [ ]
  - type: dropdown
    id: domain
    attributes:
      label: "🎯 관련 영역"
      options:
        - Frontend (React)
        - Backend (Spring/Node)
        - Mobile (Flutter/Expo)
        - Infrastructure
        - Documentation