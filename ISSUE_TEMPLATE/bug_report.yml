name: "🐛 Bug Report (Advanced)"
description: "문제를 보고하고 환경 정보를 수집합니다."
title: "[BUG]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        정확한 버그 수정을 위해 아래 양식을 자세히 작성해 주세요.
  - type: textarea
    id: bug-description
    attributes:
      label: "📌 버그 설명"
      description: "어떤 문제가 발생했나요?"
      placeholder: "간략하게 설명해 주세요."
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: "💻 발생 환경"
      options:
        - Web (Chrome/Safari)
        - iOS (App)
        - Android (App)
        - Desktop (Electron)
        - Other
    validations:
      required: true
  - type: textarea
    id: reproduction-steps
    attributes:
      label: "🎬 재현 단계"
      description: "문제를 재현하기 위한 순서를 적어주세요."
      placeholder: "1. 로그인을 합니다. 2. 마이페이지로 이동합니다..."
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: "🔢 버전 정보"
      placeholder: "예: v1.2.3"
  - type: checkboxes
    id: checks
    attributes:
      label: "✅ 사전 확인"
      options:
        - label: "최신 버전에서도 동일하게 발생하는지 확인했나요?"
          required: true
        - label: "기존에 유사한 이슈가 등록되어 있는지 검색해 보았나요?"
          required: true